<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A clean, modern and accessible login experience." />
  <title>Sign In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Theme toggle -->
  <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle theme">
    <span class="theme-icon" aria-hidden="true">🌙</span>
  </button>

  <div class="login-container">
    <form id="loginForm" class="login-form" novalidate>
      <div class="brand">
        <div class="brand-logo" aria-hidden="true">🔐</div>
      </div>

      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Please sign in to continue</p>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" aria-describedby="emailError" />
        <span class="error-message" id="emailError" role="alert"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" aria-describedby="passwordError" />
          <button type="button" id="togglePassword" class="toggle-password" aria-label="Show password" title="Show password">
            <span aria-hidden="true">👁️</span>
          </button>
        </div>
        <div class="strength" id="strengthMeter" aria-hidden="true">
          <div class="strength-bar"><span id="strengthFill"></span></div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>
        <span class="error-message" id="passwordError" role="alert"></span>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" id="remember" name="remember" />
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="login-button" id="loginButton">
        <span class="button-text">Sign In</span>
        <span class="spinner" aria-hidden="true"></span>
      </button>

      <p class="signup-text">
        Don't have an account? <a href="#">Sign up</a>
      </p>
    </form>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
