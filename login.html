<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Link to login stylesheet -->
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <h1>Sign In</h1>
        <p class="subtitle">Please enter your credentials to continue.</p>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username" placeholder="Enter your username or email" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
            </div>

            <div class="form-options">
                <label class="remember">
                    <input type="checkbox" id="remember" name="remember">
                    Remember me
                </label>
                <a href="#" class="forgot">Forgot password?</a>
            </div>

            <button type="submit" id="loginBtn">Log In</button>

            <div id="message" class="message" role="alert" aria-live="polite"></div>
        </form>

        <footer>
            <p>&copy; 2026 My Project. All rights reserved.</p>
        </footer>
    </div>

    <!-- Link to login JavaScript file -->
    <script src="login.js"></script>
</body>
</html>
